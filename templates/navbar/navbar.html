<style>
    /* ================= LIGHT THEME (UNCHANGED) ================= */
    .page-title {
        height: 105px; /* REDUCED HEIGHT */
        background: linear-gradient(135deg, #3c425c 0%, #764ba2 100%);
        color: white;

        padding: 1rem 1.5rem; /* REDUCED PADDING */
        border-radius: 15px;

        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);

        display: flex;
        align-items: center;
        justify-content: space-between;

        gap: 0.8rem; /* REDUCED GAP */

        transition: all 0.3s ease;
    }

    /* ================= DARK ================= */
    [data-theme="dark"] .page-title {
        background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.6);
    }

    /* ================= MILITARY ================= */
    [data-theme="military"] .page-title {
        background: linear-gradient(135deg, #2f4f3e 0%, #4a7c59 100%);
        box-shadow: 0 10px 30px rgba(47, 79, 62, 0.45);
    }

    /* ================= OCEAN ================= */
    [data-theme="ocean"] .page-title {
        background: linear-gradient(135deg, #0f4c5c 0%, #1b7288 100%);
        box-shadow: 0 10px 30px rgba(15, 76, 92, 0.45);
    }

    /* ================= SUNSET ================= */
    [data-theme="sunset"] .page-title {
        background: linear-gradient(135deg, #92400e 0%, #d97706 100%);
        box-shadow: 0 10px 30px rgba(146, 64, 14, 0.45);
    }

    /* ================= PURPLE ================= */
    [data-theme="purple"] .page-title {
        background: linear-gradient(135deg, #4c1d95 0%, #7e22ce 100%);
        box-shadow: 0 10px 30px rgba(76, 29, 149, 0.45);
    }

    .title-section {
        text-align: center;
        flex: 1;
    }

    .page-title h3 {
        margin: 0;
        font-size: 1.7rem; /* SLIGHTLY SMALLER */
        font-weight: 700;
        color: white;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    }

    .page-title p {
        margin: 0.5rem 0 0 0;
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.95);
    }
    /* ================= DIGITAL CLOCK ================= */

    .digital-clock {
        margin-top: 5px; /* REDUCED */
        font-size: 1rem; /* SMALLER */
        font-weight: 700;

        letter-spacing: 1px;

        color: #fff;

        text-shadow: 0 0 8px rgba(255,255,255,0.6);

        font-family: 'Courier New', monospace;
    }

    /* ================= LOGOS ================= */

    .org-logo {
        width: 90px; /* REDUCED */
        height: 90px; /* REDUCED */

        object-fit: contain;

        border-radius: 20%;

        padding: 8px; /* REDUCED */

        background: rgba(255, 255, 255, 0.15);

        backdrop-filter: blur(6px);

        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .org-logo:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    /* ================= LARGE MONITOR ================= */

    @media (min-width: 1600px) {

        .page-title {
            padding-left: 3rem;
            padding-right: 3rem;
        }

        .title-section {
            max-width: 60%;
        }
    }

    /* ================= MOBILE ================= */

    @media (max-width: 768px) {

        .page-title {
            flex-direction: column;
            height: auto;
            text-align: center;

            padding: 1rem;
        }

        .org-logo {
            width: 75px;
            height: 75px;
        }

        .title-section {
            order: 2;
        }

        .page-title h3 {
            font-size: 1.35rem;
        }

        .digital-clock {
            font-size: 0.9rem;
        }
    }
</style>
