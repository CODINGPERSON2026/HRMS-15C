<!-- ================= HEADER WITH LEFT & RIGHT LOGO ================= -->

<style>
    /* ================= LIGHT THEME (UNCHANGED) ================= */
    .page-title {
        height: 105px;
        background: linear-gradient(135deg, #3c425c 0%, #764ba2 100%);
        color: white;

        padding: 1rem 1.5rem;
        border-radius: 15px;

        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);

        display: flex;
        align-items: center;
        justify-content: space-between;

        gap: 0.8rem;

        transition: all 0.3s ease;
    }

    /* ================= DARK ================= */
    [data-theme="dark"] .page-title {
        background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.6);
    }

    /* ================= MILITARY ================= */
    [data-theme="military"] .page-title {
        background: linear-gradient(135deg, #2f4f3e 0%, #4a7c59 100%);
        box-shadow: 0 10px 30px rgba(47, 79, 62, 0.45);
    }

    /* ================= OCEAN ================= */
    [data-theme="ocean"] .page-title {
        background: linear-gradient(135deg, #0f4c5c 0%, #1b7288 100%);
        box-shadow: 0 10px 30px rgba(15, 76, 92, 0.45);
    }

    /* ================= SUNSET ================= */
    [data-theme="sunset"] .page-title {
        background: linear-gradient(135deg, #92400e 0%, #d97706 100%);
        box-shadow: 0 10px 30px rgba(146, 64, 14, 0.45);
    }

    /* ================= PURPLE ================= */
    [data-theme="purple"] .page-title {
        background: linear-gradient(135deg, #4c1d95 0%, #7e22ce 100%);
        box-shadow: 0 10px 30px rgba(76, 29, 149, 0.45);
    }

    .title-section {
        text-align: center;
        flex: 1;
    }

    .page-title h3 {
        margin: 0;
        font-size: 1.7rem;
        font-weight: 700;
        color: white;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
    }

    /* ================= DIGITAL CLOCK ================= */
    .digital-clock {
        margin-top: 5px;
        font-size: 1rem;
        font-weight: 700;

        letter-spacing: 1px;

        color: #fff;

        text-shadow: 0 0 8px rgba(255,255,255,0.6);

        font-family: 'Courier New', monospace;
    }

    /* ================= LOGOS ================= */
    .org-logo {
        width: 90px;
        height: 90px;

        object-fit: contain;

        border-radius: 20%;

        padding: 8px;

        background: rgba(255, 255, 255, 0.15);

        backdrop-filter: blur(6px);

        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .org-logo:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
    }

    /* ================= SUBSCRIPT — OPTION 3 (frosted pill + avatar) ================= */
    .sub-3 {
        margin-top: 8px;
        display: flex;
        justify-content: center;
    }

    .sub-3-inner {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        padding: 4px 14px 4px 6px;
    }

    .sub-3-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.30);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.68rem;
        font-weight: 700;
        color: white;
        letter-spacing: 0;
        flex-shrink: 0;
    }

    .sub-3-greet {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.70);
        font-weight: 400;
    }

    .sub-3-role {
        font-size: 0.78rem;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 500;
    }

    .sub-3-name {
        font-size: 0.82rem;
        font-weight: 700;
        color: #ffffff;
    }

    /* ================= LARGE MONITOR ================= */
    @media (min-width: 1600px) {
        .page-title {
            padding-left: 3rem;
            padding-right: 3rem;
        }

        .title-section {
            max-width: 60%;
        }
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {
        .page-title {
            flex-direction: column;
            height: auto;
            text-align: center;

            padding: 1rem;
        }

        .org-logo {
            width: 75px;
            height: 75px;
        }

        .title-section {
            order: 2;
        }

        .page-title h3 {
            font-size: 1.35rem;
        }

        .digital-clock {
            font-size: 0.9rem;
        }

        .sub-3-inner {
            flex-wrap: wrap;
            justify-content: center;
            border-radius: 12px;
            padding: 6px 12px;
        }
    }
</style>

<div class="page-title">

    <!-- LEFT LOGO -->
    <a href="{{ url_for('history_15cesr') }}" class="logo-link">
        <img src="/static/image_for_login_page/rt.jpg"
             class="org-logo"
             alt="15 CESR Logo">
    </a>

    <div class="title-section">

        <h3 class="fw-bold">{{ header }}</h3>

        <!-- SUBSCRIPT — OPTION 3: frosted pill with avatar initials -->
        <div class="sub-3">
            <div class="sub-3-inner">

               

                <span class="sub-3-greet">Welcome,</span>
                <span class="sub-3-role">{{ role }}</span>
                <span class="sub-3-name">{{ current_user_name }}</span>

            </div>
        </div>

        <!-- REAL TIME DIGITAL CLOCK (uncomment to enable) -->
      

    </div>

    <!-- RIGHT LOGO -->
    <a href="{{ url_for('history_15cor') }}" class="logo-link">
        <img src="/static/image_for_login_page/chinar.jpg"
             class="org-logo"
             alt="15 COR Logo">
    </a>

</div>

<script>
   
</script>
