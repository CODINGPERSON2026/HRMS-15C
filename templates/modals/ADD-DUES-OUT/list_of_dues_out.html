  /* =========================================================

  /* =========================================================

  /* =========================================================

  /* =========================================================
     NAME CELL
  ========================================================= */
  #duesOutListModal .name-cell{
    font-weight:600;

    overflow:hidden;
    text-overflow:ellipsis;

  /* =========================================================
     REMARKS
  ========================================================= */
  #duesOutListModal .remarks-text{

  /* =========================================================
     REMOVE BUTTON

  #duesOutListModal .del-btn:hover{

  /* =========================================================
     LOADER
  ========================================================= */
  #duesOutListModal .spinner-sm{
    width:24px;
    height:24px;
    border:3px solid #dbe7ff;
    border-top-color:#0d6efd;
    border-radius:50%;
    display:inline-block;
    animation:duesSpin .7s linear infinite;
  }
  
  @keyframes duesSpin{
    to{
      transform:rotate(360deg);
    }
  }
  
  /* =========================================================
     EMPTY STATE
  ========================================================= */
  #duesOutListModal .empty-cell{
    text-align:center;
    padding:2.5rem;

  /* =========================================================
     RESPONSIVE
  ========================================================= */
  @media(max-width:768px){
  
    #duesOutListModal .custom-size{
      max-width:100% !important;
      width:100% !important;
      margin:0;
    }
  
    #duesOutListModal .modal-content{
      border-radius:0;
    }
  
    #duesOutListModal .duesSearchWrap{
      width:100%;
    }
  
    #duesOutListModal .modal-header .d-flex{
      width:100%;
    }
  
  }
  </style>
  
  
  <!-- =====================================================
       DUES OUT MODAL
  ===================================================== -->
  <div class="modal fade" id="duesOutListModal" tabindex="-1">
  
    <div class="modal-dialog modal-xl custom-size">
  
      <div class="modal-content">
  
        <!-- ================= HEADER ================= -->
  
        <div class="modal-header">
  
          <div class="d-flex align-items-center gap-3 flex-wrap w-100">
  
            <!-- TITLE -->
  
            <div class="d-flex align-items-center gap-2">
  
              <h5 class="modal-title mb-0">
                Dues Out Details
              </h5>
  
            </div>
  
            <!-- SEARCH -->
  
            <div class="duesSearchWrap">
  
              <svg
                class="duesSearchIcon"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5">
  
                <circle cx="6.5" cy="6.5" r="4.5"/>
                <path d="M10.5 10.5l3 3"/>
  
              </svg>
  
              <input
                type="text"
                id="duesOutSearch"
                placeholder="Search army no or name">
  
            </div>
  
            <!-- COUNT -->
  
            <div
              class="d-flex align-items-center gap-2 px-3 py-1 rounded-3 duesCountWrap">
  
              <span class="duesCountLabel">
                Total Count
              </span>
  
              <span
                id="duesOutCount"
                class="badge rounded-pill bg-primary duesCountBadge">
  
                0
  
              </span>
  
            </div>
  
          </div>
  
          <!-- CLOSE -->
  
          <button
            class="btn-close"
            data-bs-dismiss="modal">
          </button>
  
        </div>
  
        <!-- ================= BODY ================= -->
  
        <div class="modal-body">
  
          <!-- ================= LOADER ================= -->
  
          <div
            id="duesOutLoader"
            class="text-center py-5">
  
            <span class="spinner-sm"></span>
  
            <div class="mt-2 text-muted">
              Fetching data...
            </div>
  
          </div>
  
          <!-- ================= TABLE ================= -->
  
          <div class="duesTableWrapper">
  
            <table
              id="duesOutTable"
              class="table table-bordered table-hover align-middle d-none">
  
              <thead class="table-light">
  
                <tr>
  
                  <th>Action</th>
                  <th>Army No</th>
                  <th>Rank</th>
                  <th>Name</th>
                  <th>Trade</th>
                  <th>Posted To</th>
                  <th>Dt of Move</th>
                  <th>Order No</th>
                  <th>Remarks</th>
  
                </tr>
  
              </thead>
  
              <tbody id="duesOutTableBody"></tbody>
  
            </table>
  
          </div>
  
        </div>
  
      </div>
  
    </div>
  
  </div>
  
  
  <script>
  let duesOutData = [];
  
  /* =====================================================
     DATE FORMAT
  ===================================================== */
  function formatDuesOutDate(date){
  
    if(!date) return "—";
  
    return new Date(date).toLocaleDateString(
      "en-GB",
      {
        day:"2-digit",
        month:"short",
        year:"numeric"
      }
    );
  
  }
  
  /* =====================================================
     OPEN MODAL
  ===================================================== */
  document
    .getElementById("duesOutListModal")
    .addEventListener(
      "show.bs.modal",
      async function(){
  
        await loadDuesOutData();
  
      }
    );
  
  /* =====================================================
     LOAD DATA
  ===================================================== */
  async function loadDuesOutData(){
  
    const loader =
      document.getElementById("duesOutLoader");
  
    const table =
      document.getElementById("duesOutTable");
  
    const tbody =
      document.getElementById("duesOutTableBody");
  
    loader.classList.remove("d-none");
  
    table.classList.add("d-none");
  
    tbody.innerHTML = "";
  
    try{
  
      const response =
        await fetch("/dues/dues-out/list");
  
      const result =
        await response.json();
  
      if(!result.success){
        throw new Error("Failed");
      }
  
      duesOutData = result.data || [];
  
      renderDuesOutTable(duesOutData);
  
    }
    catch(error){
  
      console.error(error);
  
      loader.innerHTML = `
        <p class="text-danger fw-bold mt-3">
          Failed to load data
        </p>
      `;
  
    }
  
  }
  
  /* =====================================================
     RENDER TABLE
  ===================================================== */
  function renderDuesOutTable(data){
  
    const tbody =
      document.getElementById("duesOutTableBody");
  
    const loader =
      document.getElementById("duesOutLoader");
  
    const table =
      document.getElementById("duesOutTable");
  
    const count =
      document.getElementById("duesOutCount");
  
    tbody.innerHTML = "";
  
    count.textContent = data.length;
  
    if(data.length === 0){
  
      tbody.innerHTML = `
        <tr>
          <td colspan="9" class="empty-cell">
            No records found
          </td>
        </tr>
      `;
  
    }
    else{
  
      data.forEach(row => {
  
        tbody.insertAdjacentHTML(
          "beforeend",
          `
  
          <tr id="dues-row-${row.id}">
  
            <td>
  
              <button
                class="del-btn duesDeleteBtn"
                data-id="${row.id}">
  
                <i class="fas fa-trash"></i>
  
                Remove
  
              </button>
  
            </td>
  
            <td>
  
              <div class="duesCellScroll">
  
                <span class="army-chip">
                  ${row.army_number || ""}
                </span>
  
              </div>
  
            </td>
  
            <td>
  
              <div class="duesCellScroll">
  
                <span class="rank-pill">
                  ${row.rank || ""}
                </span>
  
              </div>
  
            </td>
  
            <td class="name-cell">
              ${(row.name || "")
                .toLowerCase()
                .replace(/\b\w/g,c=>c.toUpperCase())}
            </td>
  
            <td>
  
              <div class="duesCellScroll">
                ${row.trade || "—"}
              </div>
  
            </td>
  
            <td>
  
              <div class="duesCellScroll">
                ${(row.posted_to || "")
                  .toLowerCase()
                  .replace(/\b\w/g,c=>c.toUpperCase())}
              </div>
  
            </td>
  
            <td>
  
              <div class="duesCellScroll">
                ${formatDuesOutDate(row.date_of_move)}
              </div>
  
            </td>
  
            <td>
  
              <div class="duesCellScroll">
                ${row.posting_order_no || "—"}
              </div>
  
            </td>
  
            <td class="remarks-text">
  
              <div class="duesCellScroll">
                ${row.remarks || "—"}
              </div>
  
            </td>
  
          </tr>
  
          `
        );
  
      });
  
    }
  
    loader.classList.add("d-none");
  
    table.classList.remove("d-none");
  
    /* ================= DELETE ================= */
  
    document
      .querySelectorAll(".duesDeleteBtn")
      .forEach(btn => {
  
        btn.addEventListener(
          "click",
          async function(){
  
            const id =
              this.dataset.id;
  
            if(
              !confirm(
                "Are you sure you want to remove this record?"
              )
            ){
              return;
            }
  
            try{
  
              const response =
                await fetch(
                  `/dues/dues-out/delete/${id}`,
                  {
                    method:"DELETE"
                  }
                );
  
              const result =
                await response.json();
  
              if(result.success){
  
                duesOutData =
                  duesOutData.filter(
                    r => String(r.id) !== String(id)
                  );
  
                renderDuesOutTable(duesOutData);
  
                showStatusModal(
                  "Removed successfully",
                  "Red",
                  2500
                );
  
              }
              else{
  
                alert(
                  result.message ||
                  "Delete failed"
                );
  
              }
  
            }
            catch(error){
  
              console.error(error);
  
              alert(
                "Something went wrong"
              );
  
            }
  
          }
        );
  
      });
  
  }
  
  /* =====================================================
     SEARCH
  ===================================================== */
  document
    .getElementById("duesOutSearch")
    .addEventListener(
      "keyup",
      function(){
  
        const value =
          this.value.toLowerCase();
  
        if(!value){
  
          renderDuesOutTable(duesOutData);
  
          return;
  
        }
  
        const filtered =
          duesOutData.filter(row =>
  
            (row.army_number || "")
              .toLowerCase()
              .includes(value)
  
            ||
  
            (row.name || "")
              .toLowerCase()
              .includes(value)
  
          );
  
        renderDuesOutTable(filtered);
  
      }
    );
  </script>
