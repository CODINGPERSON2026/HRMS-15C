<style>
    .alarm-gradient {
        position: relative;
        overflow: hidden;
        background: linear-gradient(135deg, #da4444, #c209a3);
        color: #fff;
        padding: 2px 18px;
        border-radius: 30px;
        font-weight: 600;
        font-size: 0.75rem;
        display: inline-flex;
        align-items: center;
        gap: 18px;
        cursor: pointer;
    }

    /* Shine Effect */
    .alarm-gradient::after {
        content: "";
        position: absolute;
        top: 0;
        left: -60%;
        width: 60%;
        height: 100%;
        background: linear-gradient(120deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.45) 50%, rgba(255,255,255,0) 100%);
        transform: skewX(-25deg);
        animation: shine 2.5s infinite;
    }

    @keyframes shine {
        0%   { left: -60%; }
        100% { left: 120%; }
    }
</style>

<!-- Alarm Badge -->
<span id="alarmAlert" class="alarm-gradient d-none">
    🔔 You have pending JCO Kunba assignments!
</span>

<!-- JCO Kunda Main Modal -->
<div class="modal fade" id="update_assigned_interview" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Pending JCO Kunda Assignments</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <table class="table table-striped table-bordered" id="assignedInterviewTable">
                    <thead>
                        <tr>
                            <th>Army Number</th>
                            <th>Rank</th>
                            <th>Name</th>
                            <th>Home State</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<!-- Remarks Modal -->
<div class="modal fade" id="remarksModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Add Remarks (Optional)</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <textarea id="remarksInput"
                          class="form-control"
                          rows="4"
                          maxlength="300"
                          placeholder="Enter remarks (optional)..."></textarea>
                <div class="text-end mt-1">
                    <small class="text-muted"><span id="kundaCharCount">0</span> / 300</small>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-success" id="submitRemarksBtn">Submit</button>
            </div>
        </div>
    </div>
</div>

<script>
    let selectedArmyNumber = null;
    let selectedHomeState  = null;

    /* ── Wire up char counter ── */
    document.getElementById('remarksInput')?.addEventListener('input', function () {
        document.getElementById('kundaCharCount').textContent = this.value.length;
    });

    /* ── Show the alarm badge ── */
    async function showAssignedAlarms() {
        try {
            const res    = await fetch('/api/alarms_pending_kunda_assignments');
            if (!res.ok) throw new Error("Network error");
            const result = await res.json();
            const badge  = document.getElementById("alarmAlert");

            if (result.rows && result.rows.length > 0) {
                badge.classList.remove('d-none');
            } else {
                badge.classList.add('d-none');
            }
        } catch (err) {
            console.error(err);
        }
    }

    /* ── Load pending table ── */
    async function load_pending_interview() {
        try {
            const res    = await fetch('/api/kunda_pending_personnel');
            if (!res.ok) throw new Error("Network error");
            const result = await res.json();
            const tbody  = document.querySelector("#assignedInterviewTable tbody");
            tbody.innerHTML = "";

            if (result.rows && result.rows.length > 0) {
                result.rows.forEach(r => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${r.army_number}</td>
                        <td>${r.rank}</td>
                        <td>${r.name}</td>
                        <td>${r.home_state}</td>
                        <td>
                            <button class="btn btn-success btn-sm open-remarks-btn"
                                    data-home_state="${r.home_state  || ''}"
                                    data-army_number="${r.army_number || ''}">
                                Interview Done
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center">No pending personnel</td></tr>`;
            }
        } catch (err) {
            console.error(err);
        }
    }

    /* ── Open remarks modal on button click (pre-fills existing remarks) ── */
    document.addEventListener("click", async function (e) {
        if (!e.target.classList.contains("open-remarks-btn")) return;

        selectedHomeState  = e.target.getAttribute("data-home_state");
        selectedArmyNumber = e.target.getAttribute("data-army_number");

        // Reset field and counter first
        document.getElementById("remarksInput").value = '';
        document.getElementById("kundaCharCount").textContent = '0';

        // Show modal immediately
        new bootstrap.Modal(document.getElementById("remarksModal")).show();

        // Fetch and pre-fill existing remarks in the background
        try {
            const res  = await fetch(`/interview_update/get_remarks_by_army/${selectedArmyNumber}`);
            const data = await res.json();

            if (data.remarks) {
                document.getElementById("remarksInput").value = data.remarks;
                document.getElementById("kundaCharCount").textContent = data.remarks.length;
            }
        } catch (e) {
            // Silently ignore — user can still type fresh remarks
        }
    });

    /* ── Refresh both badge and table ── */
    async function refreshAlarmsAndTable() {
        await load_pending_interview();
        await showAssignedAlarms();
    }

    /* ── Submit remarks ── */
    document.getElementById("submitRemarksBtn")?.addEventListener("click", async () => {
        const remarks = document.getElementById("remarksInput").value;

        try {
            const res = await fetch('/api/mark_interview_done', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    home_state:          selectedHomeState,
                    army_number_front_end: selectedArmyNumber,
                    remarks:             remarks
                })
            });

            const data = await res.json();

            if (!res.ok || !data.success) {
                throw new Error(data.message || "Failed");
            }

            showStatusModal("Interview completed successfully", "BLUE", 3500);

            bootstrap.Modal.getInstance(document.getElementById("remarksModal")).hide();

            await refreshAlarmsAndTable();

        } catch (err) {
            console.error(err);
            alert("Failed to submit remarks!");
        }
    });

    /* ── Open main modal on badge click ── */
    document.getElementById("alarmAlert")?.addEventListener("click", function () {
        new bootstrap.Modal(document.getElementById('update_assigned_interview')).show();
        load_pending_interview();
    });

    /* ── Initial load ── */
    document.addEventListener('DOMContentLoaded', showAssignedAlarms);
</script>
